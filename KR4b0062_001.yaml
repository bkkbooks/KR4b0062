body:
  text: 樂府釣竿篇釣竿篇釣舟畫彩鷁漁子服冰紈金轄茱萸網銀鉤翡翠竿歛橈隨水脈急漿渡江湍湍長自不辭前浦有佳期船交橈影合浦深魚出遲荷根時觸餌菱芒乍罥絲蓮度江南手衣渝京兆眉垂竿自有樂誰能為太師本集文苑英華二百十樂府詩集十八並作劉孝綽詩紀八十八又類聚四十一引紈竿湍辭期遲六韻隴頭水從軍戍隴頭隴水帶沙流時觀胡騎飲常為漢國羞釁妻成兩劍殺子祀雙鉤頓取樓蘭頸就解郅支裘勿令如李廣功多遂不酬本集類聚四十二作橫吹曲隴頭流水詩文苑英華百九十八樂府詩集二十一詩紀八十八又韻補二作樂府隴頭水引裘售二韻驄馬驅十五官期門二十屯邊徼犀羈玉鏤鞍寶刀金錯鞘一隨驄馬驅分受青蠅弔且令都護知願被將軍照誓使氈衣鄉掃地無遺噍本集文苑英華二百九樂府詩集二十四作驄馬詩紀八十八公無渡河請公無渡河河廣風威厲檣偃落金烏舟傾沒犀枻紺蓋空嚴祠白馬徒生祭銜石傷寡心崩城掩孀袂劍飛猶共水魂沈理俱逝君為川后臣妾作江妃娣本集類聚四十二作公莫渡河篇初學記六作公莫渡河文苑英華二百十樂府詩集二十六詩紀八十八塘上行苦辛篇蒲生伊何陳曲中多苦辛黃金坐銷鑠白玉遂淄磷裂衣工毀嫡掩袖切讒新嫌成跡易已愛去理難申秦雲猶變色魯日尚迴輪妾歌已腸斷君心終未親本集類聚四十一樂府詩集三十五詩紀八十八東西門行廣津寒欲歇聯檣密纜收天高匝近岫江闊少方舟餞淚留神眷離欷切私儔佇變齊兒俗當傳楚獻囚徒然頒並命秪恧思如抽本集樂府詩集三十七詩紀十八怨詩退寵辭金屋見譴斥甘泉枕席秋風起房櫳明月懸燭避窗中影香迴爐上煙丹庭斜草徑素壁點苔錢歌起蒲生曲樂奏下山絃新聲昔廣宴餘杯今自傳王嬙向絕漠宗女入祁連鴈書猶未返角馬無歸年昭臺有媵御曾坂無棄捐後薪隨復積前魚誰更憐本集樂府詩集四十一詩紀八十八採蓮曲金槳木蘭船戲採江南蓮蓮香隔浦渡荷葉滿江鮮房垂易入手柄曲自臨盤露花時濕釧風莖乍拂鈿本集類聚八十二作和採蓮詩樂府詩集五十詩紀八十八小臨海碣石望山海留連降尊極秦帝枉鉤陳漢家增禮秩石橋終不成桑田竟難測蜃氣遠生樓鮫人近潛織空勞帝女填詎動波神色本集樂府詩集五十五詩紀八十八思歸引胡地憑良馬懷驕負漢恩甘泉烽火入回中宮室燔錦車勞遠駕繡衣疲屢奔貳師已喪律都尉亦銷魂龍堆求援急狐塞請先屯櫪下驅雙駿腰邊帶兩鞬乘障無期限思歸安可論本集類聚四十二作思歸篇樂府詩集五十八詩紀八十八妾薄命篇去年從越障今歲沒胡庭嚴霜封碣石驚沙暗井陘玉篸久落鬢羅衣長挂屏浴蠶思漆水條桑憶鄭垌寄書朝鮮吏留釧武安亭勿言戎夏隔但令心契冥不見豐城劍千祀復同形本集類聚四十一作妾薄命行文苑英華二百七樂府詩集六十二作妾薄命詩紀八十八鬭鷄篇丹鷄翠翼張妬敵復專場翅中含芥粉距外耀金芒氣踰上黨烈名貴下韝良祭橋愁魏后食跖忌齊王願賜淮南藥一使雲間翔本集文苑英華二百六樂府詩集六十四詩紀八十八結客少年場行少年本六郡遨遊遍五都插腰銅匕首障日錦屠蘇鷙羽裝銀鏑犀膠飾象弧近發連雙兔高彎落九烏邊城多警急節使滿郊衢居延箭箙盡疎勒井泉枯正蒙都護接何由憚險途千金募惡少一揮擒骨都勇餘聊蹴踘戰罷暫投壺昔為北方將今為南面孤邦君行負弩縣令且前驅本集類聚四十一文苑英華百九十五樂府詩集六十六詩紀八十八行行且遊獵篇之罘講射所上林娛獵場選徒驕楚客召狩誇胡王罕車已戒道風烏復起行佽飛具矰繳材官命蹶張高罝掩月兔勁矢射天狼蹠地不遑逸排虛豈及翔日暮勾陳轉風清鐃吹颺歸來宴平樂寧肯滯禽荒本集類聚四十二作行行遊獵篇文苑英華百九十五注云一作遊行且獵篇樂府詩集六十七作行行遊且獵篇詩紀八十八雀乳空井中雀乳空井中遠去條支國心知漢德休聊棲丞相府過令黃霸羞挾子須閒地空井共尋求轆轤絲綆絕桔槔冬蘚周將憐羽翼張誰辭各背遊本集文苑英華二百六作乳雀空城中注云城一作井樂府詩集六十八詩紀八十八半渡溪本廁偏伍伴一戰殄凶渠制賜文犀節驛報紫泥書入營陳御蓋還家乘紫車皇恩知已重丹心恨不紓渡瀘且不畏凌溪嗟有餘本集樂府詩集七十四詩紀八十八獨不見夫婿結纓簪偏蒙漢寵深中人引臥內副車遊上林綬染瑯琊草蟬鑄武威金分家移甲第留妾住河陰獨寢鴛鴦被自理鳳凰琴誰憐雙玉筯流面復流襟本集文苑英華二百十一詩紀八十八行幸甘泉宮歌行幸甘泉宮歌漢家迎夏畢避暑甘泉宮棧車鳴里鼓駟馬駕相風校尉烏桓騎待詔樓煩弓後旌猶五柞前笳度九嵕才人豹尾內御酒屬車中輦迴百子閣扇動七輪風鳴鍾休衛士披圖召後宮材官促校獵涼秋戲射熊本集類聚四十三文苑英華二百三樂府詩集八十四詩紀八十八箜篌謠箜篌謠結交在相得骨肉何必親甘言無忠實世薄多蘇秦從風暫靡草富貴上昇天不見山巔樹摧扤下為薪豈甘井中泥上出作埃塵本集文苑英華二百十失名次劉孝威後樂府詩集八十七作無名氏詩紀八十八驄馬驅翩翩驄馬驅橫行復斜趨先救遼城危後拂燕山霧風傷易水湄日入隴西樹未得報君恩聯翩終不住本集文苑英華二百九樂府詩集二十四詩紀八十八和王竟陵愛妾換馬和王竟陵愛妾換馬驄馬出樓蘭一步九盤桓小史贖金絡良工送玉鞍龍驂來甚易烏孫去實難麟膠妾猶有請為急弦彈本集作愛妾換馬類聚九十三樂府詩集七十三作愛妾換馬詩紀八十八擬古應教一首擬古應教一首雙棲翡翠兩鴛鴦巫雲洛月乍相望誰家妖冶折花枝蛾眉𥊑睇使情移青鋪綠瑣琉璃扉瓊筵玉笥金縷衣美人年幾可十餘含羞轉笑歛風裾珠丸出彈不可追空留可憐持與誰本集作東飛伯勞歌玉臺新詠九文苑英華二百三二百五樂府詩集六十八詩紀八十八鷄鳴篇鷄鳴篇塒鷄識將曙長鳴高樹巔啄葉疑彰羽排花彊欲前意氣多驚舉飄揚獨無侶陳思助鬭協狸膏郈昭妬敵安金距丹山可愛有鳳凰金門飛舞有鴛鴦何如五德美豈勝千里翔本集類聚九十一作梁簡文帝樂府詩集二十八詩紀八十八烏生八九子城上烏一年生九雛枝輕巢本狹風多葉早枯氄毛不自暖張翼強相呼金柝嚴兮翠樓肅蜃壁光兮椒泥馥虞機衡網不得施猜鷹鷙隼無由逐永願共棲曾氏冠同瑞周王屋莫啼城上寒猶賢野中宿羽成翮備各西東丁年賦命有窮通不見高飛帝輦側遠託日輪中尚逢王吉箭猶嬰后羿弓豈如變彩救燕質入夢祚昭公流聲表師退集幕示營空靈臺已鑄像流蘇時候風本集文苑英華二百六樂府詩集二十八廣文選十四詩紀八十八又類聚九十二引烏雛呼東通中弓公空風十韻蜀道難蜀道難玉壘高無極銅梁不可攀雙流逆巘道九坂澀陽關鄧侯束馬度王生歛轡還歛轡懼身尤叱馭奉王猷若吝千金重誰為萬里侯戲馬吞珠界揚舲濯錦流沈犀厭怪水握鏡表靈丘禺山金碧有光輝遷亭車馬尚輕肥彌想王褒擁節反更憶相如乘傳歸君平子雲闃不嗣江漢英靈信已衰本集文苑英華二百樂府詩集四十詩紀八十八又類聚四十二引攀崗還輝肥歸稀七韻
