body:
  text: 詩重光詩并序重光儲后宣制義也赫赫重光明明二聖帝作儲述禮和樂正中衢置樽高堂懸鏡其酌不窮其明逾盛德音孔昭民胥攸詠明明二聖赫赫重光風神灑落容止汪洋瞻彼談扇載抑載揚何斯天辨如圭如璋顏閔函席游夏升堂以卿以士惟公惟王思媚儲后顧哉樂康芃芃黍苗陰雨膏之詵詵纓冕儲王導之道之以禮齊之以仁禮則探聖言則窮神訓于四國覃于萬民本集類聚十六詩紀八十八侍宴樂遊林光殿曲水侍宴樂遊林光殿曲水蒸哉軒頊赫矣堯心女媧補石重華絫金湯羅禹扇羲瑟農琴皇乎備矣受命君臨試舟五反和樂九成鉤楯祕戲協律新聲丹柸水激縫彩葩榮天吳還往海若逢迎本集類聚四詩紀八十八奉和簡文帝太子應令太子天下本元良萬國貞周朝推上嗣漢代紀重明前星涵瑞彩洊雷揚遠聲三善傳樂正百行紀司成九流遍已辨七經咸所精博聞強子政高才陵長卿禮尊逾屈己德盛益卑情仙氣貽鍾相儒道推桓榮延賢博望苑視膳長安城園綺隨金輅浮丘侍玉笙智囊前斂笏端士後垂纓九仙良所重四海更誰傾班輸同策乘甲館齊蓬瀛本集類聚十六作奉和簡文帝太子詩初學記十作奉和太子詩文苑英華百七十九詩紀八十八三日侍皇太子曲水宴三日侍皇太子曲水宴二龍巡夏代八駿馭周朝豫遊光帝則樂飲盛民謠皇儲遵洛褉濫觴追灞橋掌袚開神籞司馬動鑾鑣周旗交采眊晉鼓雜清簫旌宮臨廣隰藻衛爍巖椒蘭樽沿曲岸靈若泝回潮類聚四詩紀八十八奉和六月壬午應令玄圃棲金碧靈澗挹琨瑤築山圖碣岫穿池控海潮雷奔石鯨動水闊牽牛遙乘黿猶怯渡鞭石詎成橋岸崩下生窟壁峭上干霄噪蛙常獨沸游魚或自跳荒徑橫臨浦空舟斜插橈愁鴟集古樹白鷺隱青苗神心重丘壑散步懷漁樵石纍元卿徑枝挂許由瓢伊臣本寂寞由來畏市朝為貪止山水所競惟逍遙寄言周伯況勞君擅縠綃本集古今歲時雜詠四十四文苑英華百七十九詩紀八十八登覆舟山望湖北紫川通太液丹岑連少華堂皇更隱映松灌雜交加荇蒲浮新葉漁舟繞落花浴童競淺岸漂女擇平沙極望傷春目回車歸狹斜本集類聚二十八廣文選九作望湖北詩詩紀八十八帆渡吉陽洲江風凌曉急鉦鼓候晨催幸息榜人唱聊望高帆開聯村倏忽盡循汀俄頃回疑是傍洲退似覺前山來將與圖南競誰云勞泝洄本集類聚二十七文苑英華二百八十九詩紀八十八出新林芒山視洛邑函谷望秦京遙分承露掌遠見長安城故鄉已可識遊子必勞情霧罷前林見風息涌川平坐觀暮潮落漸見夕煙生無由一羽化徒想御風輕類聚二十八廣文選九詩紀八十八鄀縣遇見人織率爾寄婦鄀縣遇見人織率爾寄婦妖姬含怨情織素起秋聲度梭環玉動踏躡佩珠鳴經稀疑杼澀緯斷恨絲輕葡萄始欲罷鴛鴦猶未成雲棟共徘徊紗窗相向開窗疏眉語度紗輕眼笑來朧朧隔淺紗的的見粧華鏤玉同心藕列寶連枝花紅衫向後結金簪臨鬢斜機頂挂流蘇機旁垂結珠青絲引伏兔黃金繞鹿盧豔彩裾邊出芳脂口上渝百城交問遺五馬共峙直為閨中人守故不要新夢啼漬花枕覺淚濕羅巾獨眠真自難重衾猶覺寒愈憶凝脂暖彌想橫陳歡行驅金絡騎歸就城南端城南稍有期想子亦勞思羅襦久應罷花叉堪更治新粧莫點黛余還自畫眉本集玉臺新詠八類聚六十五作在郤縣遇見人織寄婦詩詩紀八十七侍宴賦得龍沙宵月明鵲飛空繞樹月輪殊未圓嫦娥望不出桂枝猶隱殘落照移樓影浮光動塹瀾櫪馬悲羌吹城烏啼塞寒傳聞機杼妾愁余衣服單當秋絡已脆銜啼織復難斂眉雖不樂舞劍強為歡請謝函關吏行當泥一丸本集玉臺新詠八詩紀八十八奉和晚日虬簷挂珠箔虹梁卷霜綃迷迭涵香長芙蓉逐浪搖飛輪搏羽扇翻車引落潮甘泉推激水迎風慚遠飆寄言王待詔因聲張子僑吾君安已樂無勞誦洞簫本集類聚五詩紀八十八和皇太子春林晚雨雲樹交為密雨日共成虹雷舒長男氣枝搖少女風葉珠隨滴水簷繩下溜空蝶濡飛不揚花沾色更紅明離信養德能事畢春宮誰堪偶鳳吹唯有浮丘公本集類聚二文苑英華百五十三詩紀八十八行還值雨又為清道所駐齊楚磐石貴韓吳異姓王俱乘早朝罷相隨出建章喧呼驚里閈叫咷駭康莊皂騶同隼擊青橐似鷹揚掖門南北遠復道東西長幡旗爭絡繹官騎鬱相望微風生棨傳輕雨潤帷裳油衣分競道小蓋列成行八舍便繁密五營輿服光回車避司隸俄軒揖內郎況余白屋士自依卑路傍日月雖臨照仄陋難明早榮羞日及晚知慚豫章徒抱凌雲志終愧摩天翔安能久淪辱圖南會有方本集文苑英華百五十三詩紀八十八望雨清陰蕩暄濁飛雨入階廊瞻空亂無緒望霤耿成行交枝含曉潤雜葉帶新光浮芥離還聚沿漚滅復張浴禽飄落毳風荇散餘香璚綃挂繡幕象簟列華床侍童拂羽扇廚人奉濫漿寄言楚臺客雄風詎獨涼本集文苑英華百五十三詩紀八十八又類聚二初學記二並引廊行光張香涼六韻苦暑苦暑暮日苦炎溽遷坐接階廊月麗姮娥影星含織女光棲禽動夜竹流螢出暗牆香盤糅鮮粉雕壺承玉漿白羽徒垂握緑水自周堂弱紈猶覺重纖絺尚少涼弄風思漢朔戲雨憶吳王玄冰術難驗赤道漏猶長誰能更吹律還令黍谷涼本集作苦熱類聚五文苑英華二百十詩紀八十八奉和逐涼鐘鳴夜未央避暑起倣徨長河似曳素明星若散璫倚巖欣石冷臨池愛水涼月纖張敞畫荷妖韓壽香對此遊清夜何勞娛洞房本集類聚五詩紀八十八望棲烏夕烏飛參差單雄雜寡雌聯翩歸葉裏出沒噪林垂爭棲時易樹驚飛忽度枝雖無繫書重亦有含纓疲以茲憔悴力重逢輕薄兒珠丸蘇合彈金繳青絲縻豈意翩翾羽遂免更羸危入懷欣得地依林竊願知本集文苑英華三百二十九詩紀八十八和簡文帝臥疾玉躬耗寒暑群望崇圭璧仁祀盛黃縑禮壇優紺席憊均楚疾愈俄同宋年益豈勞誦賦臣寧用觀濤客本集藝文類聚七十五詩紀八十八賦得曲澗澗流急易轉溪竹暗難開近樓俄已失前洲忽復回石岸生寒蘚沈根漬水苔菱舟失道去歸鳧迷徑來本集藝文類聚九詩紀八十八春宵花開人不歸節暖衣須變回叉挂反環拭淚繩春線今夜月輪圓胡兵必應戰本集類聚三十二詩紀八十八冬曉冬曉妾家邊洛城慣識曉鐘聲鐘聲猶未盡漢使報應行天寒硯冰凍心悲書不成本集玉臺新詠八藝文類聚三十二詩紀八十八詠織女詠織女金鈿已照耀白日未蹉跎欲待黃昏至含嬌淺渡河本集玉臺新詠十作劉孝儀藝文類聚四初學記四又古今歲時雜詠二十五御覽三十一萬花谷後四俱作劉孝儀詩紀八十八七夕穿針縷亂恐風來衫輕羞指現故穿雙眼針持縫合歡扇本集類聚四初學記四古今歲時雜詠二十五歲時廣記二十六詩紀八十八九日酌菊酒九日酌菊酒露花疑始摘羅衣似適薰餘杯度不取欲持嬌使君本集類聚四初學記四古今歲時雜詠三十三詩紀八十八賦得鳴朄應令雜扇雖俱斂交行忿自分轉袖時繞腕揚履自開裙初學記十六詩紀八十八和定襄侯初笄和定襄侯初笄合鬟仍昔髮略鬢即前絲從今一梳罷無復更縈時玉臺新詠十詩紀八十八古體雜意朝日大風霜寄事是交傷葉落枝柯淨當自起棊張玉臺新詠十詩紀八十八詠佳麗可憐將可念可念直千金唯言有一恨恨不遂人心玉臺新詠十詩紀八十八望隔牆花隔牆花半隱猶見動花枝當由美人摘詎止春風吹本集類聚八十八詩紀八十八枯葉竹枯楊猶更緑臥柳尚還生勿嫌鳳不至終當待聖明本集類聚八十九詩紀八十八和簾裏燭開關簾影出參差風焰斜浮光燭綺帶凝滴汙垂花類聚八十詩紀八十八詠剪綵花葉舒非漸大花發是初開無論人訝似蜂見也爭來類聚八十八古今歲時雜詠三詩紀八十八褉飲嘉樂殿詠曲水中燭影火浣花心猶未長金枝密焰已流芳芙蓉池畔涵停影桃花水脈引行光類聚八十詩紀八十八賦得香出衣香出衣步近氣逾飛博山登高用鄴錦含情動靨比洛妃香纓麝帶縫金縷瓊花玉勝綴珠徽蘇合故年微恨歇都梁路遠恐非新猶賢漢君芳千里尚笑荀令止三旬類聚六十七詩紀八十七
