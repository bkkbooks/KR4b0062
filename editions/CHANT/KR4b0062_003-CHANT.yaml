body:
  text: 卷三謝賚官紙啟臣與謝嘏俱慚棊聖臣之衝梯實愧魯般之巧嘏之城壘特無禽子之守攻弱侮亡其勞甚薄策勳行賞為渥過隆雖復鄴殿鳳銜漢朝魚網平準桃花中宮穀樹固以慚茲靡滑謝此鮮光藝文類聚五十八婚謝晉安王賜錢啟婚謝晉安王賜錢啟孝威問吉已通請期有日而賢夫之譽多愧張耳非壻之才偶同王粲睠言前事良以自羞曲降隆慈俯垂珍錫便使禽贄獲舉纁幣有資佩服寵靈殞越非報藝文類聚六十六謝敕賚畫屏風啟昔紀亮所隔唯珍雲母武秋所顧大寶琉璃豈若寫帝臺之基拂崑山之碧畫巧吳筆素踰魏賜馮商莫能賦李尢誰敢銘藝文類聚六十九謝賚錦被啟色豔蒲萄采踰聯璧鄂君慚繡楚侍羞珠雖復帝賜鶴綾客贈鴛綺高懸麗藻遠謝鮮明漢老悅其怪文魏馬驚其香氣藝文類聚七十御覽七百七謝東宮賜聖僧餘饌啟齊桓柏寢之器周穆軒宮之寶乳糜香飯素糗漿五杏七桃靈瓜仙棗莫不氣馥上天薰流下界石崇芳果金谷僅於萬株陳湯木滋杜陵幾于千樹猶自高謝珍奇多慚品族藝文類聚七十二謝東宮賜淨饌啟糜獻牛牧飯出龍宮千品甘露之食百花珍藥之果餅兼髓乳漿苞蔗柰雕盤流其滋旨寶器委其包香足使五世長者羞彼識味一角仙人恥其呪術微物多幸叨奉曲恩性命可捐殊私難荅藝文類聚七十二謝東宮賚鹿脯等啟上林絕胡人之搏禁地無張京之犯而猶有班超之遊獵李廣之馳射遠歸於廚吏入貢於腊人形圖三事之車影入九仙之鏡藝文類聚七十二御覽八百六十二謝東宮賚炭啟洛城雪深不見海神之跡滹沱冰合無待王霸之覘聚而為嶽大壯黑山稱之以船將重牙獸鑪生烽焰室滿紅光雉裘入而識奢鼠布焚而無污謝東宮賚藕啟色華玉樹味奪瓊漿根出楊池聞之僮約子為靈散得自莊篇楚后江萍秦公海棗凡厥水羞莫敢相輩藝文類聚八十二謝賜㮈啟孫井浮朱初學記二十八為皇太子謝敕賚功德馬啟伏惟忘我徇物屈己濟民該天地而大捨摠日月而為施既脫𨋗於金輪又解驂於紺馬出余吾之水服騊駼之廄名高夏后之龍價倍田方之贖謹當秣以柏葉飴以丹棗加之玉鞍飾之金絡藝文類聚九十三謝賚熊白啟謝賚熊白啟竊以館有射熊之名臺無走狗之號上林絕胡人之搏禁地無張京之犯而突出羽川來攀御檻光踰厚璧殆惑朱公之價色麗燭銀將堪穆王之寶藝文類聚九十五謝賚林檎書勇聞齊國止錫二桃遠至仙方裁蒙數棗豈如恩豐漢篋賜廣魏奩姹女數而僅通筭郎計而方得生於玉井之側出自金膏之地上靈所貴下土希逢藝文類聚八十七謝南康王饟牛書謝南康王饟牛書雖復蜀守神牛秦公怒特穆王白角何氏瑩蹄無以逾其勁力邁其致遠直宿九重獲免疏步路休三逕且息徒行從祀甘泉方無假於丞相騎至清廟又永笑於博陽藝文類聚九十四正旦春雞贊寶雞陳倉祠光表神雄飛帝漢雌鳴霸秦排膺激怒礴翅張瞋電鞭失焰雷車折輪助摽魏教擅場齊珍名流晉戟歌傳漢臣竊脂善盜摶穀難馴綠鸚智淺蒼鷹害深兼姿五德歸于翰音藝文類聚九十一辟厭青牛畫贊泰山怒特吳渚神牛氣噓風噴精迴電流詎牽和鞅不入裴鞦狡力難京肆怒橫行朗陵瑩角介葛瞻聲遁仙託稱妖寇馮名名震八區威陵五都蓄勇槽側息憤場隅仇覽獻豆滕嬰進芻雄兒楷式悍士規模曹興拂采徐邈成圖藝文類聚九十四
